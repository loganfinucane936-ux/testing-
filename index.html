<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clicker Empire</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0e0e0e;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#game{
    width:520px;
    background:#1b1b1b;
    padding:20px;
    border-radius:12px;
    text-align:center;
}

button{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

#clickBtn{
    background:#2ecc71;
    font-size:18px;
}

.upgrade{background:#333;color:white;}
.upgrade:hover{background:#444;}

.nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:10px 0;
}

.page{display:none;}
.active{display:block;}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
}

#rebirthBtn{
    width:140px;
    background:#444;
    color:white;
}

#saveBtn{
    width:140px;
    background:#2980b9;
    color:white;
    margin-top:5px;
}

.bar{
    background:#333;
    height:14px;
    border-radius:8px;
    overflow:hidden;
    margin-bottom:10px;
}

#rebirthBar{
    height:100%;
    width:0%;
    background:#2ecc71;
}
</style>

</head>
<body>

<div id="game">

<h2>Clicker Empire</h2>

<div class="top">
  <div>Coins: <span id="coins">0</span></div>
  <button id="rebirthBtn" onclick="rebirth()">REBIRTH</button>
</div>

<button id="saveBtn" onclick="saveGame()">SAVE GAME</button>

<div class="bar">
  <div id="rebirthBar"></div>
</div>

<div>PC: <span id="pc">1</span> | CPS: <span id="cps">0</span> | Rebirth: <span id="reb">0</span></div>

<button id="clickBtn">CLICK</button>

<div class="nav">
<button onclick="change(-1)">⬅</button>
<div>Page <span id="pageNum">1</span>/15</div>
<button onclick="change(1)">➡</button>
</div>

<div id="pages"></div>

</div>

<script>

/* ================= CORE ================= */
let coins=0, pc=1, cps=0, page=1, rebirthLevel=0;

/* ================= FORMAT ================= */
function format(n){
    if(n>=1e12) return (n/1e12).toFixed(2)+"T";
    if(n>=1e9) return (n/1e9).toFixed(2)+"B";
    if(n>=1e6) return (n/1e6).toFixed(2)+"M";
    if(n>=1e3) return (n/1e3).toFixed(2)+"K";
    return Math.floor(n);
}

/* ================= REBIRTH ================= */
function rebirthCost(){
    return 1000000 * Math.pow(2, rebirthLevel);
}

function rebirthMult(){
    return 1 + Math.log10(rebirthLevel + 1) * 2;
}

function rebirth(){
    if(coins < rebirthCost()) return;

    rebirthLevel++;
    coins=0;
    pc=1;
    cps=0;

    upgrades.forEach(u=>u.cost=u.base);

    update();
}

/* ================= CLICK ================= */
function getClick(){
    let base = pc;
    if(rebirthLevel >= 3){
        let crit = Math.random() < Math.min(0.15 + rebirthLevel*0.01,0.6);
        if(crit) base *= (3 + rebirthLevel*0.2);
    }
    return base;
}

document.getElementById("clickBtn").onclick=()=>{
    coins += getClick() * rebirthMult();
    update();
};

/* ================= 45 UPGRADES ================= */
let upgrades = [];

function add(name, base, type, value, scale){
    upgrades.push({name, cost:base, base, type, value, scale});
}

/* Tier 1 */
add("Finger Training",10,"pc",1,1.22);
add("Grip Strength",25,"pc",2,1.22);
add("Click Speed",50,"pc",3,1.22);
add("Soft Mouse",80,"pc",5,1.22);
add("Better Desk",120,"pc",8,1.22);

/* Tier 2 */
add("Auto Miner",200,"cps",2,1.23);
add("Factory",400,"cps",5,1.23);
add("Workers",800,"cps",10,1.23);
add("Robotic Arm",1500,"cps",20,1.23);
add("Automation Line",2500,"cps",35,1.23);

/* Tier 3 */
add("Mouse Upgrade",4000,"pc",15,1.25);
add("Cyber Fingers",7000,"pc",25,1.25);
add("Neural Click",12000,"pc",50,1.25);
add("Quantum Tap",20000,"pc",100,1.25);
add("Time Click",35000,"pc",200,1.25);

/* Tier 4 */
add("Oil Rig",60000,"cps",100,1.27);
add("Mega Factory",100000,"cps",200,1.27);
add("Robot Army",200000,"cps",500,1.27);
add("Space Factory",400000,"cps",1200,1.27);
add("Moon Mine",800000,"cps",2500,1.27);

/* Tier 5 */
add("Quantum Hand",1500000,"pc",500,1.3);
add("Hyper Click",3000000,"pc",1200,1.3);
add("Click Titan",6000000,"pc",3000,1.3);
add("God Finger",12000000,"pc",7000,1.3);
add("Infinity Tap",25000000,"pc",15000,1.3);

/* Tier 6 */
add("Space Mine",40000000,"cps",5000,1.32);
add("AI Core",80000000,"cps",12000,1.32);
add("Galaxy Drill",150000000,"cps",25000,1.32);
add("Star Factory",300000000,"cps",60000,1.32);
add("Black Hole Extractor",600000000,"cps",150000,1.32);

/* Endgame */
add("REBIRTH",1000000,"rebirth",1,1);

/* ================= BUY ================= */
function buy(i){
    let u=upgrades[i];
    if(!u || coins<u.cost) return;

    coins-=u.cost;

    if(u.type==="pc") pc+=u.value;
    if(u.type==="cps") cps+=u.value;
    if(u.type==="rebirth") rebirth();

    u.cost=Math.floor(u.cost*u.scale);

    render();
    update();
}

/* ================= PAGE ================= */
function change(d){
    page += d;
    if(page<1) page=15;
    if(page>15) page=1;
    render();
}

/* ================= RENDER ================= */
function render(){
    let html="";

    for(let i=0;i<15;i++){
        html += `<div class="page ${i+1===page?'active':''}">`;

        for(let j=0;j<3;j++){
            let idx=i*3+j;
            let u=upgrades[idx];
            if(!u) continue;

            let t=u.type==="pc"?"+PC":u.type==="cps"?"+CPS":"REBIRTH";

            html+=`
            <button class="upgrade" onclick="buy(${idx})">
            ${u.name} (${t}:${u.value}) - ${format(u.cost)}
            </button>`;
        }

        html+="</div>";
    }

    document.getElementById("pages").innerHTML=html;
    document.getElementById("pageNum").innerText=page;
}

/* ================= UPDATE ================= */
function update(){
    document.getElementById("coins").innerText=format(coins);
    document.getElementById("pc").innerText=pc;
    document.getElementById("cps").innerText=cps;
    document.getElementById("reb").innerText=rebirthLevel;

    let cost=rebirthCost();
    document.getElementById("rebirthBar").style.width=Math.min(coins/cost,1)*100+"%";
    document.getElementById("rebirthBtn").innerText="REBIRTH ("+format(cost)+")";
}

/* ================= SAVE / LOAD ================= */
function saveGame(){
    localStorage.setItem("clickerSave",JSON.stringify({
        coins,pc,cps,page,rebirthLevel,
        upgrades
    }));
    alert("Game Saved!");
}

function loadGame(){
    let data = localStorage.getItem("clickerSave");
    if(!data) return;

    data = JSON.parse(data);

    coins=data.coins;
    pc=data.pc;
    cps=data.cps;
    page=data.page;
    rebirthLevel=data.rebirthLevel;

    if(data.upgrades) upgrades=data.upgrades;
}

/* ================= LOOP ================= */
setInterval(()=>{
    coins+=cps*rebirthMult();
    update();
},1000);

/* ================= INIT ================= */
loadGame();
render();
update();

</script>

</body>
</html>
