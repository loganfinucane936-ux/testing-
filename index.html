<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clicker Empire (PC ONLY)</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0e0e0e;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#game{
    width:520px;
    background:#1b1b1b;
    padding:20px;
    border-radius:12px;
    text-align:center;
}

button{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

#clickBtn{
    background:#2ecc71;
    font-size:18px;
}

.upgrade{background:#333;color:white;}
.upgrade:hover{background:#444;}

.nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:10px 0;
}

.page{display:none;}
.active{display:block;}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
}

#rebirthBtn{
    width:160px;
    background:#444;
    color:white;
}

#saveBtn{
    width:160px;
    background:#2980b9;
    color:white;
}

.bar{
    background:#333;
    height:14px;
    border-radius:8px;
    overflow:hidden;
    margin-bottom:10px;
}

#rebirthBar{
    height:100%;
    width:0%;
    background:#2ecc71;
}
</style>

</head>
<body>

<div id="game">

<h2>Clicker Empire (PC Only)</h2>

<div class="top">
  <div>Coins: <span id="coins">0</span></div>
  <button id="rebirthBtn" onclick="rebirth()">REBIRTH</button>
</div>

<button id="saveBtn" onclick="saveGame()">SAVE GAME</button>

<div class="bar">
  <div id="rebirthBar"></div>
</div>

<div>PC: <span id="pc">1</span> | Rebirth: <span id="reb">0</span></div>

<button id="clickBtn">CLICK</button>

<div class="nav">
<button onclick="change(-1)">⬅</button>
<div>Page <span id="pageNum">1</span>/15</div>
<button onclick="change(1)">➡</button>
</div>

<div id="pages"></div>

</div>

<script>

/* ================= CORE ================= */
let coins=0;
let pc=1;
let page=1;
let rebirthLevel=0;

/* ================= FORMAT ================= */
function format(n){
    if(n>=1e12) return (n/1e12).toFixed(2)+"T";
    if(n>=1e9) return (n/1e9).toFixed(2)+"B";
    if(n>=1e6) return (n/1e6).toFixed(2)+"M";
    if(n>=1e3) return (n/1e3).toFixed(2)+"K";
    return Math.floor(n);
}

/* ================= REBIRTH ================= */
function rebirthCost(){
    return 1000000 * Math.pow(2, rebirthLevel);
}

function rebirthMult(){
    return 1 + Math.log10(rebirthLevel + 1) * 2;
}

function rebirth(){
    if(coins < rebirthCost()) return;

    rebirthLevel++;
    coins=0;
    pc=1;

    upgrades.forEach(u=>u.cost=u.base);

    update();
}

/* ================= CLICK ================= */
function getClick(){
    let base = pc;

    if(rebirthLevel >= 3){
        let crit = Math.random() < Math.min(0.15 + rebirthLevel*0.01,0.6);
        if(crit) base *= (3 + rebirthLevel*0.2);
    }

    return base;
}

document.getElementById("clickBtn").onclick=()=>{
    coins += getClick() * rebirthMult();
    update();
};

/* ================= 45 PC UPGRADES ================= */
let upgrades=[];

function add(name, base, value, scale){
    upgrades.push({name, cost:base, base, value, scale});
}

/* Tier 1 */
add("Finger Training",10,1,1.22);
add("Grip Strength",25,2,1.22);
add("Click Speed",50,3,1.22);
add("Soft Mouse",80,5,1.22);
add("Better Desk",120,8,1.22);

/* Tier 2 */
add("Wrist Warmup",200,10,1.23);
add("Focus Training",350,15,1.23);
add("Mouse Grip Tape",600,20,1.23);
add("Gaming Mouse",1000,30,1.23);
add("Fast Reflexes",1600,45,1.23);

/* Tier 3 */
add("Cyber Fingers",2500,60,1.25);
add("Neural Click",4000,90,1.25);
add("Quantum Tap",7000,130,1.25);
add("Time Click",12000,200,1.25);
add("Reality Break",20000,300,1.25);

/* Tier 4 */
add("Hyper Finger",35000,450,1.27);
add("Speed Inject",60000,700,1.27);
add("Adrenal Boost",100000,1000,1.27);
add("Robot Finger",180000,1500,1.27);
add("Nano Click",300000,2500,1.27);

/* Tier 5 */
add("Quantum Hand",500000,4000,1.3);
add("Hyper Click",900000,7000,1.3);
add("Click Titan",1500000,12000,1.3);
add("God Finger",3000000,20000,1.3);
add("Infinity Tap",6000000,35000,1.3);

/* Tier 6 */
add("Star Click",10000000,60000,1.32);
add("Galaxy Finger",20000000,100000,1.32);
add("Black Hole Tap",40000000,180000,1.32);
add("Universe Click",80000000,300000,1.32);
add("Reality Tap",150000000,500000,1.32);

/* Tier 7 */
add("Divine Click",300000000,900000,1.35);
add("Omega Finger",600000000,1500000,1.35);
add("Final Tap",1200000000,2500000,1.35);
add("Eternal Click",2500000000,4000000,1.35);
add("VOID CLICK",5000000000,8000000,1.35);

/* REBIRTH */
add("REBIRTH",1000000,1,1);

/* ================= BUY ================= */
function buy(i){
    let u=upgrades[i];
    if(!u || coins<u.cost) return;

    coins-=u.cost;

    if(u.name==="REBIRTH"){
        rebirth();
        return;
    }

    pc+=u.value;
    u.cost=Math.floor(u.cost*u.scale);

    render();
    update();
}

/* ================= PAGE ================= */
function change(d){
    page+=d;
    if(page<1) page=15;
    if(page>15) page=1;
    render();
}

/* ================= RENDER ================= */
function render(){
    let html="";

    for(let i=0;i<15;i++){
        html += `<div class="page ${i+1===page?'active':''}">`;

        for(let j=0;j<3;j++){
            let idx=i*3+j;
            let u=upgrades[idx];
            if(!u) continue;

            html+=`
            <button class="upgrade" onclick="buy(${idx})">
                ${u.name} (+${u.value} PC) - ${format(u.cost)}
            </button>`;
        }

        html+="</div>";
    }

    document.getElementById("pages").innerHTML=html;
    document.getElementById("pageNum").innerText=page;
}

/* ================= UPDATE ================= */
function update(){
    document.getElementById("coins").innerText=format(coins);
    document.getElementById("pc").innerText=pc;
    document.getElementById("reb").innerText=rebirthLevel;

    let cost=rebirthCost();
    document.getElementById("rebirthBar").style.width=
        Math.min(coins/cost,1)*100+"%";

    document.getElementById("rebirthBtn").innerText=
        "REBIRTH ("+format(cost)+")";
}

/* ================= SAVE / LOAD ================= */
function saveGame(){
    localStorage.setItem("clickerSavePCONLY",JSON.stringify({
        coins,pc,page,rebirthLevel,upgrades
    }));
    alert("Saved!");
}

function loadGame(){
    let data = localStorage.getItem("clickerSavePCONLY");
    if(!data) return;

    data=JSON.parse(data);

    coins=data.coins;
    pc=data.pc;
    page=data.page;
    rebirthLevel=data.rebirthLevel;

    if(data.upgrades) upgrades=data.upgrades;
}

/* ================= START ================= */
loadGame();
render();
update();

</script>

</body>
</html>
